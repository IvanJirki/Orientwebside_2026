# Kopioi palvelimelle (esim. /etc/nginx/sites-available/orient-kebab) ja tee symlink sites-enablediin.
# Muuta `server_name` ja lisää SSL (certbot / oma sertifikaatti) tuotantoon.

server {
    listen 80;
    listen [::]:80;
    server_name esimerkki.fi www.esimerkki.fi;

    root /var/www/orient-kebab;
    index index.html;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;

    add_header X-Content-Type-Options "nosniff" always;

    location = /index.html {
        add_header Cache-Control "no-cache";
    }

    location / {
        try_files $uri $uri/ /index.html;
    }

    location ~* \.(?:js|css|png|jpg|jpeg|gif|ico|svg|webp|woff2?)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Tuotanto-HTTPS (esim. certbot lisää nämä automaattisesti):
    # listen 443 ssl http2;
    # ssl_certificate /etc/letsencrypt/live/esimerkki.fi/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/esimerkki.fi/privkey.pem;
}
